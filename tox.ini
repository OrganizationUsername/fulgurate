[tox]
envlist = lint, typing, py39, py310, py311, py312, py313
requires =
    tox-uv

[testenv]
deps =
    pytest
    pytest-cov
extras =
    cmd-line
commands =
    pytest --cov fulgurate test --cov-report term --cov-report xml:coverage.xml test/

[testenv:lint]
deps =
    pylint
    pytest
extras =
    cmd-line
commands =
    pylint src/fulgurate/
    pylint --rcfile test/pylintrc test/

[testenv:typing]
deps =
    mypy
    pip # for mypy install-types
extras =
    cmd-line
commands =
    mypy --non-interactive --install-types --strict src/
