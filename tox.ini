[tox]
envlist = lint, py38, py39, py310, py311, py312, py313
requires =
    tox-uv

[testenv]
deps =
    pytest
    pytest-cov
extras =
    cmd-line
commands =
    pytest --cov fulgurate test --cov-report term --cov-report xml:coverage.xml test/

[testenv:lint]
deps =
    pylint
    pytest
extras =
    cmd-line
commands =
    pylint src/fulgurate/
    pylint --rcfile test/pylintrc test/
