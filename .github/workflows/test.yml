name: Python

on: [push]

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: Install tox
      run: pip install tox
    - name: Run tox
      run: tox
    - name: Run make
      run: make
